name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    # [T-6] Secret Scan
    - name: Secret scan
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Setup Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Test suite (fast only, with coverage)
      run: |
        pytest tests/ \
          -m "not slow" \
          --timeout=120 \
          --cov=src \
          --cov-report=term-missing \
          --cov-report=xml:coverage.xml \
          --cov-fail-under=75
          
    - name: Build Docker api image
      run: |
        docker build --target api -t solar-sentinel-api .
        
    - name: Staging Compose Check
      run: |
        docker compose -f docker-compose.staging.yml up -d
        sleep 15
        curl -sf http://localhost:8000/health
        docker compose -f docker-compose.staging.yml down

  load-test:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        
    - name: Load test (SLO-2 + SLO-3)
      run: |
        docker compose -f docker-compose.staging.yml up -d
        
        # Readiness polling loop with retry logic
        for i in {1..12}; do
          if curl -sf http://localhost:8000/health; then
            echo "API is ready!"
            break
          fi
          echo "Waiting for API..."
          sleep 5
        done
        
        pip install locust
        locust -f tests/load/locustfile.py \
          --host http://localhost:8000 \
          --users 20 --spawn-rate 4 --run-time 2m \
          --headless --csv tests/load/ci_results \
          --exit-code-on-error 1
          
        docker compose -f docker-compose.staging.yml down
