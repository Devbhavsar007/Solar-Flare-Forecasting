version: '3.8'

services:
  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    environment:
      - ENV=prod
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow

  worker:
    build:
      context: .
      target: worker
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    environment:
      - ENV=prod
      - FITS_SOURCE=pradan
      # Injected securely via environment variables (GitHub secrets / prod runtime)
      - PRADAN_USERNAME=${PRADAN_USERNAME}
      - PRADAN_PASSWORD=${PRADAN_PASSWORD}
    depends_on:
      - api

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.2
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db
    volumes:
      - ./data/mlflow:/mlflow

  prometheus:
    image: prom/prometheus:v2.45.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus
    command: --config.file=/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:10.2.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=solarsentinel
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/dashboards:/var/lib/grafana/dashboards
